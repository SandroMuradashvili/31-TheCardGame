<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BURA — Thirty-One</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Code+Pro:wght@400;600&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --felt:       #1a4a2e;
  --felt-dark:  #0f2e1c;
  --felt-mid:   #1e5535;
  --cream:      #f5f0e8;
  --card-bg:    #fffef8;
  --gold:       #c8a84b;
  --gold-dim:   #7a6228;
  --red:        #c0392b;
  --red-bright: #e74c3c;
  --black-card: #1a1208;
  --trump-glow: rgba(200,168,75,0.55);
  --ui-bg:      rgba(8,24,14,0.88);
  --ui-border:  rgba(200,168,75,0.28);
  --text-light: #e8e0d0;
  --text-dim:   #7a9a7a;
  --anim-speed: 0.8s;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--felt-dark);
  font-family:'Crimson Pro',Georgia,serif;
  color:var(--text-light);
  min-height:100vh;
  overflow-x:hidden;
  background-image:
    radial-gradient(ellipse at 50% -10%, rgba(34,85,53,0.5) 0%, transparent 65%),
    repeating-linear-gradient(45deg,transparent,transparent 9px,rgba(255,255,255,0.012) 9px,rgba(255,255,255,0.012) 10px);
}

/* ─── LOBBY ──────────────────────────────── */
#lobby{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.lobby-box{
  background:var(--ui-bg);
  border:1px solid var(--ui-border);
  border-radius:18px;
  padding:44px 44px 36px;
  max-width:440px;width:100%;
  backdrop-filter:blur(12px);
}
.lobby-title{font-family:'Playfair Display',serif;font-size:3.5rem;font-weight:900;color:var(--gold);text-shadow:0 0 30px var(--trump-glow);letter-spacing:0.05em;}
.lobby-sub{font-size:0.78rem;letter-spacing:0.3em;color:var(--text-dim);text-transform:uppercase;margin-bottom:36px;}
.tabs{display:flex;gap:0;margin-bottom:24px;border-radius:8px;overflow:hidden;border:1px solid var(--ui-border);}
.tab{flex:1;padding:9px;text-align:center;cursor:pointer;font-size:0.82rem;letter-spacing:0.1em;text-transform:uppercase;background:transparent;color:var(--text-dim);border:none;font-family:'Crimson Pro',serif;transition:all .2s;}
.tab.active{background:rgba(200,168,75,0.15);color:var(--gold);}
.field{margin-bottom:14px;}
.field label{font-size:0.72rem;letter-spacing:0.12em;color:var(--text-dim);display:block;margin-bottom:5px;text-transform:uppercase;}
.field input,.field select{
  width:100%;background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);border-radius:8px;
  padding:10px 14px;color:var(--text-light);
  font-family:'Crimson Pro',serif;font-size:1rem;outline:none;
  transition:border-color .2s;
}
.field input:focus,.field select:focus{border-color:var(--gold);}
.field select option{background:#0f2e1c;}
.room-waiting{
  text-align:center;padding:20px 0;
  display:none;
}
.room-code-display{
  font-family:'Playfair Display',serif;font-size:3rem;
  letter-spacing:0.3em;color:var(--gold);
  margin:12px 0;text-shadow:0 0 20px var(--trump-glow);
}
.room-link{font-size:0.75rem;color:var(--text-dim);word-break:break-all;margin-bottom:16px;}
.room-link a{color:var(--gold);text-decoration:none;}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--text-dim);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ─── GAME UI ────────────────────────────── */
#game-ui{display:none;max-width:960px;margin:0 auto;padding:8px 10px 16px;}

header{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 14px;background:var(--ui-bg);
  border:1px solid var(--ui-border);border-radius:10px;
  margin-bottom:8px;backdrop-filter:blur(8px);
}
.logo{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:900;color:var(--gold);letter-spacing:0.1em;}
.logo span{color:var(--text-dim);font-size:0.65rem;font-weight:400;letter-spacing:0.25em;display:block;margin-top:-2px;}
.hdr-right{display:flex;gap:8px;align-items:center;}

/* score bar */
#score-bar{
  display:flex;justify-content:center;align-items:center;gap:24px;
  padding:6px 20px;background:var(--ui-bg);border:1px solid var(--ui-border);
  border-radius:9px;margin-bottom:8px;
}
.score-entry{text-align:center;}
.score-name{font-size:0.65rem;letter-spacing:0.15em;color:var(--text-dim);text-transform:uppercase;}
.score-val{font-family:'Playfair Display',serif;font-size:2rem;color:var(--gold);line-height:1;transition:transform .3s;}
.score-val.bump{transform:scale(1.4);}
.score-sep{color:var(--text-dim);font-size:1.2rem;}
.target-info{font-size:0.6rem;color:var(--text-dim);margin-top:2px;}

/* trump strip */
#trump-strip{
  display:flex;align-items:center;justify-content:center;gap:10px;
  padding:5px 14px;background:rgba(200,168,75,0.07);
  border:1px solid var(--ui-border);border-radius:8px;margin-bottom:8px;
  font-size:0.8rem;color:var(--text-dim);letter-spacing:0.1em;
}
.trump-suit-icon{font-size:1.3rem;}

/* status banner */
#status-banner{
  padding:6px 14px;text-align:center;font-size:0.82rem;
  border-radius:7px;margin-bottom:8px;display:none;
  transition:all .3s;
}
#status-banner.visible{display:block;}
#status-banner.info{background:rgba(200,168,75,0.1);border:1px solid rgba(200,168,75,0.3);color:var(--gold);}
#status-banner.warn{background:rgba(231,76,60,0.12);border:1px solid rgba(231,76,60,0.3);color:var(--red-bright);}

/* debug panel */
#debug-panel{
  display:none;background:rgba(0,0,0,0.75);border:1px solid #2a3a2a;
  border-radius:8px;padding:10px 12px;margin-bottom:8px;
  font-family:'Source Code Pro',monospace;font-size:0.68rem;color:#8a9a7a;
}
#debug-panel.visible{display:block;}
#debug-panel h4{color:#e8c55a;margin-bottom:8px;}
.dbg-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px;}
.dbg-cell label{display:block;color:#4a7a4a;font-size:0.62rem;margin-bottom:2px;}
.dbg-hand{margin-bottom:5px;}
.dbg-hand label{color:#4a7a4a;font-size:0.62rem;}
.dcard{display:inline-block;background:#0a1a0a;border:1px solid #2a4a2a;padding:1px 5px;border-radius:3px;margin:1px;}
.dcard.trump{border-color:#c8a84b;color:#c8a84b;}
.dbg-log{color:#3a6a3a;font-size:0.63rem;max-height:80px;overflow-y:auto;margin-top:6px;white-space:pre-wrap;}

/* ─── TABLE AREA ─────────────────────────── */
#table-area{
  background:var(--felt);border-radius:14px;
  border:1.5px solid rgba(200,168,75,0.15);
  padding:14px 16px;margin-bottom:8px;
  min-height:200px;display:flex;align-items:center;justify-content:center;
  position:relative;
  box-shadow:inset 0 2px 24px rgba(0,0,0,0.45),0 3px 12px rgba(0,0,0,0.3);
  overflow:hidden;
}

/* deck widget */
#deck-widget{
  position:absolute;right:18px;top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;align-items:center;gap:5px;
}
.deck-stack{position:relative;width:64px;height:90px;}
.deck-back{
  position:absolute;width:62px;height:88px;
  background:linear-gradient(135deg,#2a1a6e,#160a44);
  border:1.5px solid var(--gold-dim);border-radius:6px;
  box-shadow:1px 1px 0 rgba(0,0,0,0.4);
}
.deck-back:nth-child(1){top:3px;left:3px;}
.deck-back:nth-child(2){top:1px;left:1px;}
.deck-back:nth-child(3){top:0;left:0;}
.deck-back::after{
  content:'★';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  color:rgba(200,168,75,0.3);font-size:1.4rem;
}
.deck-count-label{font-size:0.65rem;color:var(--text-dim);}
#trump-card-in-deck{
  position:absolute;right:90px;top:50%;transform:translateY(-50%) rotate(-90deg);
}

/* played cards zone */
#played-zone{
  display:flex;flex-direction:column;align-items:center;gap:8px;
  min-width:200px;
}
.zone-label{
  font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;
  color:var(--text-dim);transition:color .3s;
}
.zone-label.maliutka{color:var(--red-bright);animation:pulseRed 1s ease infinite;}
@keyframes pulseRed{0%,100%{opacity:1;}50%{opacity:0.5;}}

.played-row{display:flex;gap:8px;justify-content:center;min-height:100px;align-items:center;}

/* ─── CARDS ──────────────────────────────── */
.card{
  width:78px;height:110px;
  background:var(--card-bg);border:1.5px solid #d0c4a8;border-radius:8px;
  display:flex;flex-direction:column;justify-content:space-between;
  padding:5px;cursor:pointer;
  box-shadow:2px 3px 8px rgba(0,0,0,0.45);
  transition:transform var(--anim-speed) cubic-bezier(.175,.885,.32,1.275),
             box-shadow var(--anim-speed) ease;
  position:relative;user-select:none;flex-shrink:0;
}
.card:hover:not(.no-hover){transform:translateY(-8px) scale(1.03);box-shadow:2px 10px 20px rgba(0,0,0,0.5);}
.card.selected{
  transform:translateY(-14px) scale(1.04)!important;
  box-shadow:0 0 0 2.5px var(--gold),2px 14px 24px rgba(0,0,0,0.55)!important;
  background:#fffef0;
}
.card.trump-glow{
  box-shadow:0 0 0 1.5px var(--gold),0 0 14px var(--trump-glow),2px 3px 8px rgba(0,0,0,0.4);
}
.card.trump-glow.selected{
  box-shadow:0 0 0 2.5px var(--gold),0 0 20px var(--trump-glow),2px 14px 24px rgba(0,0,0,0.55)!important;
}
.card.no-hover{cursor:default;}
.card.face-down{
  background:linear-gradient(135deg,#2a1a6e,#160a44);
  border-color:var(--gold-dim);cursor:default;
}
.card.face-down::after{
  content:'★';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  color:rgba(200,168,75,0.3);font-size:1.6rem;
}

.cc{display:flex;flex-direction:column;align-items:center;line-height:1.1;}
.cc .rank{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;}
.cc .sym{font-size:.85rem;}
.card-mid{font-size:1.9rem;text-align:center;flex:1;display:flex;align-items:center;justify-content:center;}
.cc.bot{transform:rotate(180deg);}
.red{color:var(--red);}
.blk{color:var(--black-card);}

/* card deal animation */
/* card deal animation — slides in from deck position (right side) */
@keyframes dealFromDeck{
  0%  { opacity:0; transform:translateX(220px) translateY(-80px) rotate(18deg) scale(0.65); }
  60% { opacity:1; transform:translateX(-8px) translateY(4px) rotate(-1deg) scale(1.04); }
  100%{ opacity:1; transform:none; }
}
/* card appearing in hand from draw */
@keyframes cardAppear{
  0%  { opacity:0; transform:translateY(-18px) scale(0.88); }
  65% { opacity:1; transform:translateY(3px) scale(1.03); }
  100%{ opacity:1; transform:none; }
}
/* card sliding onto table — from player's hand area downward */
@keyframes cardToTable{
  0%  { opacity:0; transform:translateY(-40px) scale(0.78) rotate(-4deg); }
  55% { opacity:1; transform:translateY(6px) scale(1.06) rotate(1deg); }
  100%{ opacity:1; transform:none; }
}
/* score bump */
@keyframes scoreBump{
  0%  { transform:scale(1); }
  40% { transform:scale(1.55); color:var(--gold); }
  100%{ transform:scale(1); }
}
.deal-anim  { animation:dealFromDeck  0.8s cubic-bezier(.22,.68,0,1.2) both; }
.appear-anim{ animation:cardAppear    0.6s cubic-bezier(.22,.68,0,1.2) both; }
.table-anim { animation:cardToTable   0.65s cubic-bezier(.22,.68,0,1.2) both; }

/* ─── PLAYER ZONES ───────────────────────── */
.player-zone{
  background:var(--ui-bg);border:1px solid var(--ui-border);
  border-radius:11px;padding:10px 14px;margin-bottom:8px;
  transition:border-color .3s,box-shadow .3s;
  position:relative;
}
.player-zone.active-turn{
  border-color:rgba(200,168,75,0.6);
  box-shadow:0 0 0 1px rgba(200,168,75,0.2),0 0 18px rgba(200,168,75,0.08);
}
.zone-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;}
.zone-name{font-family:'Playfair Display',serif;font-size:0.95rem;font-weight:700;color:var(--text-light);}
.active-pill{
  background:var(--gold);color:var(--black-card);
  font-size:0.58rem;font-weight:700;padding:2px 8px;border-radius:20px;
  letter-spacing:0.12em;text-transform:uppercase;
  animation:pulseGold 1.5s ease infinite;
}
@keyframes pulseGold{0%,100%{opacity:1;}50%{opacity:0.6;}}
.pile-info{font-size:0.7rem;color:var(--text-dim);display:flex;align-items:center;gap:6px;}
.pile-info .kp{color:var(--gold);}
.pile-info .hid{color:var(--text-dim);font-style:italic;}
.tip-icon-btn{
  background:none;border:none;cursor:pointer;font-size:0.9rem;
  opacity:0.5;transition:opacity .2s, transform .2s;padding:0 2px;
  line-height:1;
}
.tip-icon-btn:hover{opacity:1;transform:scale(1.2);}
.tip-icon-btn.active{opacity:1;filter:drop-shadow(0 0 4px var(--gold));}
/* tip popup anchored below player zone */
.tip-popup{
  position:absolute;left:14px;right:14px;bottom:calc(100% + 6px);
  background:rgba(8,24,14,0.97);border:1px solid var(--ui-border);
  border-radius:9px;padding:10px 14px;font-size:0.8rem;
  color:var(--text-light);animation:cardAppear .3s ease both;
  line-height:1.85;z-index:10;box-shadow:0 6px 24px rgba(0,0,0,0.6);
}
.tip-popup .tl{color:var(--gold);}
.tip-popup .tw{color:#7ec89a;}
.tip-popup .tx{color:var(--red-bright);}
.tip-popup::after{
  content:'';position:absolute;left:20px;top:100%;
  border:6px solid transparent;border-top-color:var(--ui-border);
}
.hand-row{display:flex;gap:7px;flex-wrap:wrap;min-height:112px;align-items:flex-end;}

/* ─── ACTION PANEL ───────────────────────── */
#action-panel{
  background:var(--ui-bg);border:1px solid var(--ui-border);
  border-radius:11px;padding:12px 14px;margin-bottom:8px;
}
.action-title{font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px;}
.action-msg{font-size:1rem;color:var(--text-light);margin-bottom:10px;min-height:1.4em;line-height:1.5;}
.action-msg .hl{color:var(--gold);font-weight:600;}
.action-msg .warn{color:var(--red-bright);font-weight:600;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}

/* stake inline */
.stake-info{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(200,168,75,0.1);border:1px solid rgba(200,168,75,0.25);
  border-radius:6px;padding:3px 10px;font-size:0.8rem;color:var(--text-dim);
  margin-right:4px;
}
.stake-info .sv{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--gold);font-weight:700;}
.stake-pending{color:var(--red-bright);}

/* ─── BUTTONS ────────────────────────────── */
.btn{
  font-family:'Crimson Pro',serif;font-size:0.88rem;font-weight:600;
  padding:8px 17px;border:none;border-radius:7px;cursor:pointer;
  transition:all .15s;letter-spacing:0.04em;white-space:nowrap;
}
.btn:disabled{opacity:.3;cursor:not-allowed;transform:none!important;}
.btn:hover:not(:disabled){transform:translateY(-1px);}
.btn:active:not(:disabled){transform:translateY(0);}
.btn-gold{background:linear-gradient(135deg,#c8a84b,#9a7828);color:var(--black-card);box-shadow:0 2px 8px rgba(200,168,75,0.3);}
.btn-gold:hover:not(:disabled){box-shadow:0 4px 14px rgba(200,168,75,0.5);}
.btn-green{background:linear-gradient(135deg,#2e7d52,#1a5234);color:var(--cream);border:1px solid rgba(200,168,75,0.2);}
.btn-red{background:linear-gradient(135deg,#c0392b,#8b1a10);color:var(--cream);}
.btn-ghost{background:transparent;color:var(--text-dim);border:1px solid rgba(255,255,255,0.14);}
.btn-ghost:hover:not(:disabled){color:var(--text-light);border-color:rgba(255,255,255,0.28);}
.btn-sm{font-size:0.76rem;padding:5px 11px;}
/* tip styles moved to pile-info section */

/* ─── ROUND MODAL ────────────────────────── */
#round-modal{
  position:fixed;inset:0;background:rgba(0,0,0,0.72);
  display:none;align-items:center;justify-content:center;
  z-index:100;backdrop-filter:blur(5px);
}
#round-modal.visible{display:flex;}
.modal-box{
  background:var(--felt-dark);border:1px solid var(--ui-border);
  border-radius:16px;padding:36px 44px;max-width:400px;width:92%;
  text-align:center;box-shadow:0 24px 64px rgba(0,0,0,0.75);
  animation:cardAppear .4s ease both;
}
.modal-title{font-family:'Playfair Display',serif;font-size:2rem;font-weight:900;margin-bottom:8px;}
.modal-title.win{color:var(--gold);}
.modal-title.lose{color:var(--red-bright);}
.modal-sub{font-size:.95rem;color:var(--text-dim);margin-bottom:20px;line-height:1.5;}
.modal-scores{display:flex;justify-content:center;gap:20px;margin-bottom:24px;}
.ms-entry{text-align:center;}
.ms-name{font-size:.65rem;color:var(--text-dim);letter-spacing:.1em;}
.ms-val{font-family:'Playfair Display',serif;font-size:2.2rem;color:var(--gold);}

/* ─── TOAST ──────────────────────────────── */
#toasts{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:6px;pointer-events:none;}
.toast{
  background:rgba(8,24,14,0.96);border:1px solid var(--ui-border);
  border-radius:8px;padding:9px 18px;font-size:.82rem;color:var(--text-light);
  text-align:center;animation:cardAppear .3s ease both;
  backdrop-filter:blur(8px);min-width:200px;
}
.toast.error{border-color:rgba(192,57,43,.6);color:#e8887e;}
.toast.win{border-color:rgba(200,168,75,.6);color:var(--gold);}
.toast.info{border-color:rgba(46,125,82,.5);color:#7ec89a;}

/* round info footer */
#round-info{text-align:center;font-size:.65rem;color:var(--text-dim);padding:3px;letter-spacing:.1em;}

/* ─── ACTION LOG ─────────────────────────── */
#action-log{
  background:var(--ui-bg);border:1px solid var(--ui-border);
  border-radius:9px;padding:8px 12px;margin-bottom:8px;
  max-height:72px;overflow-y:auto;
  font-size:0.75rem;color:var(--text-dim);
  scroll-behavior:smooth;
}
.log-entry{padding:1px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
.log-entry:last-child{border-bottom:none;color:var(--text-light);}
.log-entry .le-type{color:var(--gold);margin-right:5px;}

/* ─── WAITING / LOBBY UI ─────────────────── */
#waiting-screen{
  display:none;text-align:center;padding:40px 20px;
}
.wait-code{font-family:'Playfair Display',serif;font-size:3rem;color:var(--gold);letter-spacing:.3em;text-shadow:0 0 20px var(--trump-glow);}
.wait-link{font-size:.75rem;color:var(--text-dim);word-break:break-all;margin:8px 0 20px;}

/* responsive */
@media(max-width:580px){
  .card{width:64px;height:90px;}
  .card-mid{font-size:1.5rem;}
  .cc .rank{font-size:.9rem;}
}
</style>
</head>
<body>

<!-- Toasts -->
<div id="toasts"></div>

<!-- Round Modal -->
<div id="round-modal">
  <div class="modal-box">
    <div class="modal-title" id="modal-title">Round Over</div>
    <div class="modal-sub" id="modal-sub"></div>
    <div class="modal-scores" id="modal-scores"></div>
    <button class="btn btn-gold" id="modal-btn" style="width:100%">Next Round →</button>
  </div>
</div>

<!-- ─── LOBBY ─────────────────────────────── -->
<div id="lobby">
  <div class="lobby-box">
    <div class="lobby-title">BURA</div>
    <div class="lobby-sub">Thirty-One · Cutter</div>

    <!-- Mode tabs -->
    <div class="tabs">
      <button class="tab active" id="tab-hvb" onclick="switchTab('hvb')">vs Bot</button>
      <button class="tab" id="tab-create" onclick="switchTab('create')">Host Game</button>
      <button class="tab" id="tab-join" onclick="switchTab('join')">Join Game</button>
    </div>

    <!-- HvB -->
    <div id="tab-hvb-content">
      <div class="field"><label>Your Name</label><input id="lb-name-hvb" value="Player" maxlength="20"></div>
      <div class="field">
        <label>Target Score</label>
        <select id="lb-target-hvb"><option value="7" selected>7 pts</option><option value="11">11 pts</option></select>
      </div>
      <button class="btn btn-gold" style="width:100%;padding:12px;margin-top:6px;" onclick="startHvB()">Deal Cards</button>
    </div>

    <!-- Host -->
    <div id="tab-create-content" style="display:none;">
      <div class="field"><label>Your Name</label><input id="lb-name-host" value="Host" maxlength="20"></div>
      <div class="field">
        <label>Target Score</label>
        <select id="lb-target-host"><option value="7" selected>7 pts</option><option value="11">11 pts</option></select>
      </div>
      <button class="btn btn-gold" style="width:100%;padding:12px;margin-top:6px;" onclick="createRoom()">Create Room</button>
      <!-- waiting display -->
      <div class="room-waiting" id="room-waiting">
        <div style="font-size:.75rem;color:var(--text-dim);margin-bottom:4px;">ROOM CODE</div>
        <div class="room-code-display" id="room-code-display"></div>
        <div class="room-link" id="room-link-display"></div>
        <div><span class="spinner"></span> Waiting for opponent to join…</div>
      </div>
    </div>

    <!-- Join -->
    <div id="tab-join-content" style="display:none;">
      <div class="field"><label>Your Name</label><input id="lb-name-guest" value="Guest" maxlength="20"></div>
      <div class="field"><label>Room Code</label><input id="lb-room-code" placeholder="ABCDEF" maxlength="6" style="text-transform:uppercase;letter-spacing:.2em;font-size:1.2rem;text-align:center;"></div>
      <button class="btn btn-gold" style="width:100%;padding:12px;margin-top:6px;" onclick="joinRoom()">Join Game</button>
    </div>
  </div>
</div>

<!-- ─── GAME UI ────────────────────────────── -->
<div id="game-ui">

  <header>
    <div class="logo">BURA <span>Thirty-One</span></div>
    <div class="hdr-right">
      <button class="btn btn-ghost btn-sm" id="debug-btn" onclick="toggleDebug()">⚙ Debug</button>
      <button class="btn btn-ghost btn-sm" onclick="showLobby()">◀ Menu</button>
    </div>
  </header>

  <div id="score-bar">
    <div class="score-entry">
      <div class="score-name" id="sn0">Player</div>
      <div class="score-val" id="sv0">0</div>
    </div>
    <div class="score-sep">vs</div>
    <div class="score-entry">
      <div class="score-name" id="sn1">Bot</div>
      <div class="score-val" id="sv1">0</div>
    </div>
    <div class="score-entry">
      <div class="score-name">Target</div>
      <div class="score-val" id="sv-target">7</div>
      <div class="target-info">points</div>
    </div>
  </div>

  <div id="trump-strip">
    <span style="font-size:.7rem;letter-spacing:.15em;">TRUMP</span>
    <span class="trump-suit-icon" id="trump-icon">—</span>
    <span id="trump-card-text" style="color:var(--gold)">—</span>
    <span id="deck-count-text" style="font-size:.7rem;color:var(--text-dim)">20 cards left</span>
  </div>

  <div id="status-banner"></div>

  <!-- Debug Panel -->
  <div id="debug-panel">
    <h4>⚙ DEBUG MODE</h4>
    <div class="dbg-grid">
      <div class="dbg-cell"><label>PHASE</label><span id="dbg-phase">—</span></div>
      <div class="dbg-cell"><label>STAKE</label><span id="dbg-stake">—</span></div>
      <div class="dbg-cell"><label>ACTIVE</label><span id="dbg-active">—</span></div>
      <div class="dbg-cell"><label>CALC</label><span id="dbg-calc">—</span></div>
    </div>
    <div class="dbg-hand"><label>P1 HAND: </label><span id="dbg-p1h"></span></div>
    <div class="dbg-hand"><label>P2 HAND: </label><span id="dbg-p2h"></span></div>
    <div class="dbg-hand"><label>P1 PILE: </label><span id="dbg-p1p"></span></div>
    <div class="dbg-hand"><label>P2 PILE: </label><span id="dbg-p2p"></span></div>
    <div class="dbg-hand"><label>DECK TOP5: </label><span id="dbg-deck"></span></div>
    <div class="dbg-log" id="dbg-log"></div>
  </div>

  <!-- Action Log -->
  <div id="action-log"></div>

  <!-- Opponent Zone -->
  <div class="player-zone" id="zone-1">
    <div class="zone-header">
      <span class="zone-name" id="zone-name-1">Bot</span>
      <span id="active-pill-1"></span>
      <span class="pile-info" id="pile-info-1">Pile: 0 cards</span>
    </div>
    <div class="hand-row" id="hand-1"></div>
  </div>

  <!-- Table -->
  <div id="table-area">
    <div id="played-zone">
      <div class="zone-label" id="table-label">Waiting to deal…</div>
      <div class="played-row" id="played-row"></div>
    </div>
    <div id="deck-widget">
      <div class="deck-stack" id="deck-stack">
        <div class="deck-back"></div>
        <div class="deck-back"></div>
        <div class="deck-back"></div>
      </div>
      <div class="deck-count-label" id="deck-count-widget">20</div>
      <div id="trump-card-in-deck"></div>
    </div>
  </div>

  <!-- Player Zone -->
  <div class="player-zone" id="zone-0">
    <div class="zone-header">
      <span class="zone-name" id="zone-name-0">Player</span>
      <span id="active-pill-0"></span>
      <span class="pile-info" id="pile-info-0">
        Pile: 0 cards
        <button class="tip-icon-btn" id="tip-icon-btn" onclick="toggleTip(event)" title="Estimate your score">💡</button>
      </span>
    </div>
    <div id="tip-popup-container"></div>
    <div class="hand-row" id="hand-0"></div>
  </div>

  <!-- Action Panel -->
  <div id="action-panel">
    <div class="action-title">Your Action</div>
    <div class="action-msg" id="action-msg">Starting…</div>
    <div class="btn-row" id="action-btns"></div>
  </div>

  <div id="round-info">ROUND <span id="round-num">0</span> · STAKE <span id="stake-num">1</span></div>
</div>

<script>
'use strict';
// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let roomId = null;
let myPlayerIdx = 0;   // 0 = host/solo, 1 = guest in HvH
let gameMode = 'hvb';  // 'hvb' or 'hvh'
let gameState = null;
let prevState = null;
let selectedCards = [];
let passModeActive = false;
let passCount = 0;
let debugMode = false;
let pollTimer = null;
let showTip = false;
let modalShown = false; // prevent modal re-trigger on re-render

// ─────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────
const SUIT_SYM = {hearts:'♥',diamonds:'♦',clubs:'♣',spades:'♠'};
const suit_sym = s => SUIT_SYM[s] || s;
const is_red = s => s === 'hearts' || s === 'diamonds';
const color_cls = s => is_red(s) ? 'red' : 'blk';

function toast(msg, type='info', dur=3000) {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), dur);
}

function setStatus(msg, type='info') {
  const el = document.getElementById('status-banner');
  el.textContent = msg;
  el.className = msg ? `visible ${type}` : '';
}

function logAction(text) {
  const log = document.getElementById('action-log');
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML = text;
  log.appendChild(entry);
  log.scrollTop = log.scrollHeight;
  // Keep only last 20 entries
  while (log.children.length > 20) log.removeChild(log.firstChild);
}

async function api(path, body=null) {
  const opts = { headers: {'Content-Type':'application/json'} };
  if (body !== null) { opts.method = 'POST'; opts.body = JSON.stringify(body); }
  else opts.method = 'GET';
  try {
    const res = await fetch(path, opts);
    const data = await res.json();
    if (!data.success) { toast(data.error || 'Error', 'error'); return null; }
    return data;
  } catch(e) {
    toast('Network error', 'error');
    return null;
  }
}

const ROOM = p => `/api/room/${roomId}/${p}`;

// ─────────────────────────────────────────────
// LOBBY TABS
// ─────────────────────────────────────────────
function switchTab(tab) {
  ['hvb','create','join'].forEach(t => {
    document.getElementById(`tab-${t}`).classList.toggle('active', t===tab);
    document.getElementById(`tab-${t}-content`).style.display = t===tab ? '' : 'none';
  });
}

// ─────────────────────────────────────────────
// GAME START FLOWS
// ─────────────────────────────────────────────
async function startHvB() {
  const name = document.getElementById('lb-name-hvb').value.trim() || 'Player';
  const target = document.getElementById('lb-target-hvb').value;
  gameMode = 'hvb';
  myPlayerIdx = 0;
  const data = await api('/api/create_room', {player_name:name, mode:'hvb', target_score:target});
  if (!data) return;
  roomId = data.room_id;
  enterGame(data);
}

async function createRoom() {
  const name = document.getElementById('lb-name-host').value.trim() || 'Host';
  const target = document.getElementById('lb-target-host').value;
  gameMode = 'hvh';
  myPlayerIdx = 0;
  const data = await api('/api/create_room', {player_name:name, mode:'hvh', target_score:target});
  if (!data) return;
  roomId = data.room_id;

  // Show waiting UI
  document.getElementById('room-code-display').textContent = data.room_id;
  document.getElementById('room-link-display').innerHTML =
    `Share: <a href="${data.join_link}" target="_blank">${data.join_link}</a>`;
  document.getElementById('room-waiting').style.display = 'block';
  document.querySelector('#tab-create-content .btn').disabled = true;

  // Poll for guest joining
  const waitPoll = setInterval(async () => {
    const st = await api(`/api/room/${roomId}/status`);
    if (st && st.is_full) {
      clearInterval(waitPoll);
      // Fetch initial state
      const stData = await api(ROOM(`state?perspective=${myPlayerIdx}`));
      if (stData && stData.state) {
        gameState = stData.state;
        enterGame({room_id: roomId});
      }
    }
  }, 1200);
}

async function joinRoom() {
  const name = document.getElementById('lb-name-guest').value.trim() || 'Guest';
  let code = document.getElementById('lb-room-code').value.toUpperCase().trim();
  if (!code) { toast('Enter a room code', 'error'); return; }
  gameMode = 'hvh';
  myPlayerIdx = 1;
  const data = await api('/api/join_room', {player_name:name, room_id:code});
  if (!data) return;
  roomId = data.room_id;
  enterGame(data);
}

function enterGame(data) {
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('game-ui').style.display = 'block';
  selectedCards = [];
  passModeActive = false;
  modalShown = false;
  document.getElementById('action-log').innerHTML = '';

  // Auto-start round for HvB (game is already started by server)
  if (gameMode === 'hvb') {
    refreshState();
  } else {
    // For HvH, start round
    startRoundAfterJoin();
  }

  // Start polling for HvH multiplayer
  if (gameMode === 'hvh') {
    startPolling();
  }
}

async function startRoundAfterJoin() {
  const data = await api(ROOM('start_round'), {player_idx: myPlayerIdx});
  if (data && data.state) { gameState = data.state; render(); }
}

function showLobby() {
  stopPolling();
  document.getElementById('lobby').style.display = 'flex';
  document.getElementById('game-ui').style.display = 'none';
  // Reset room-waiting UI
  document.getElementById('room-waiting').style.display = 'none';
  const createBtn = document.querySelector('#tab-create-content .btn');
  if (createBtn) createBtn.disabled = false;
  roomId = null;
  gameState = null;
  selectedCards = [];
  modalShown = false;
}

// ─────────────────────────────────────────────
// URL-BASED JOIN (for shareable links /join/CODE)
// ─────────────────────────────────────────────
function checkUrlJoin() {
  const m = window.location.pathname.match(/^\/join\/([A-Z]{6})$/i);
  if (m) {
    const code = m[1].toUpperCase();
    switchTab('join');
    document.getElementById('lb-room-code').value = code;
  }
}

// ─────────────────────────────────────────────
// POLLING (HvH multiplayer)
// ─────────────────────────────────────────────
function startPolling() {
  stopPolling();
  pollTimer = setInterval(async () => {
    if (!roomId || !gameState) return;
    const phase = gameState?.phase;
    // Don't poll if it's my turn (I'll get state from my own actions)
    const isMyTurn = (phase === 'playing' && gameState.active_player_idx === myPlayerIdx)
                  || (phase === 'stakes' && gameState.stake_offerer_idx !== myPlayerIdx)
                  || ((phase === 'cutting' || phase === 'forced_cut') && gameState.playing_player_idx === myPlayerIdx)
                  || (phase === 'calculating' && gameState.calculator_idx === myPlayerIdx);
    if (isMyTurn) return;
    if (phase === 'round_over' || phase === 'game_over') return;

    await refreshState(false); // silent refresh
  }, 1200);
}

function stopPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

// ─────────────────────────────────────────────
// STATE REFRESH
// ─────────────────────────────────────────────
async function refreshState(withRender=true) {
  if (!roomId) return;
  const debug = debugMode ? '&debug=true' : '';
  const data = await api(ROOM(`state?perspective=${myPlayerIdx}${debug}`));
  if (data && data.state) {
    prevState = gameState;
    gameState = data.state;
    if (withRender) render();
  }
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function render() {
  if (!gameState) return;
  const s = gameState;

  // Scores
  document.getElementById('sn0').textContent = s.players[0].name;
  document.getElementById('sn1').textContent = s.players[1].name;
  updateScore(0, s.players[0].game_score);
  updateScore(1, s.players[1].game_score);
  document.getElementById('sv-target').textContent = s.target_score;
  document.getElementById('round-num').textContent = s.round_number;
  document.getElementById('stake-num').textContent = s.current_stake;

  // Trump
  renderTrump(s);

  // Zones
  renderZone(0, s);
  renderZone(1, s);

  // Table
  renderTable(s);

  // Action panel
  renderActions(s);

  // Debug
  if (debugMode) renderDebug(s);

  // Modal
  if ((s.phase === 'round_over' || s.phase === 'game_over') && !modalShown) {
    modalShown = true;
    setTimeout(() => showRoundModal(s), 400);
  }
  if (s.phase !== 'round_over' && s.phase !== 'game_over') {
    modalShown = false;
  }
}

let prevScores = [0, 0];
function updateScore(idx, val) {
  const el = document.getElementById(`sv${idx}`);
  el.textContent = val;
  if (val !== prevScores[idx]) {
    prevScores[idx] = val;
    el.classList.add('bump');
    setTimeout(() => el.classList.remove('bump'), 350);
  }
}

function renderTrump(s) {
  const suit = s.trump_suit;
  const card = s.trump_card;
  const sym = suit ? suit_sym(suit) : '—';
  const cls = suit ? color_cls(suit) : '';
  document.getElementById('trump-icon').innerHTML = suit
    ? `<span class="${cls}">${sym}</span>` : '—';
  document.getElementById('trump-card-text').textContent = card
    ? `${card.rank}${sym}` : '—';
  document.getElementById('deck-count-text').textContent = `${s.deck.size} left`;
  document.getElementById('deck-count-widget').textContent = s.deck.size;
  document.getElementById('deck-stack').style.opacity = s.deck.size > 0 ? '1' : '0.3';

  // Trump card shown sideways in deck
  const tc = document.getElementById('trump-card-in-deck');
  if (card) {
    tc.innerHTML = buildCard(card, false, false, true);
  } else {
    tc.innerHTML = '';
  }
}

function renderZone(idx, s) {
  const player = s.players[idx];
  const isMe = idx === myPlayerIdx;
  const isActive = s.active_player_idx === idx && s.phase === 'playing';

  document.getElementById(`zone-name-${idx}`).textContent = player.name;
  document.getElementById(`zone-${idx}`).classList.toggle('active-turn', isActive);

  // Active pill
  const pill = document.getElementById(`active-pill-${idx}`);
  pill.innerHTML = isActive ? '<span class="active-pill">YOUR TURN</span>' : '';

  // Pile info — update text content preserving the tip icon button
  const pi = document.getElementById(`pile-info-${idx}`);
  let pileText = '';
  if (isMe || debugMode) {
    const known = player.known_pile_points;
    const hc = player.hidden_card_count;
    const hmin = player.hidden_min_points;
    const hmax = player.hidden_max_points;
    pileText = `<span class="kp">${known}pts known</span>`;
    if (hc > 0) pileText += ` + <span class="hid">${hc} hidden (${hmin}–${hmax})</span>`;
    pileText += ` (${player.pile_count} cards)`;
    if (debugMode && player.pile_points !== null) {
      pileText += ` <span style="color:var(--gold)">[TRUE: ${player.pile_points}]</span>`;
    }
  } else {
    pileText = `${player.pile_count} cards`;
  }
  // Only update text nodes, keep the tip button intact (it's only in zone-0)
  if (idx === myPlayerIdx) {
    // Replace everything except the tip button
    const tipBtn = pi.querySelector('.tip-icon-btn');
    pi.innerHTML = pileText;
    if (tipBtn) pi.appendChild(tipBtn);
  } else {
    pi.innerHTML = pileText;
  }

  // Hand
  const container = document.getElementById(`hand-${idx}`);
  const canSelect = isMe && canSelectCards(s);
  renderHandCards(container, player.hand, canSelect, idx, s);
}

function canSelectCards(s) {
  const phase = s.phase;
  // Can select cards to play during stakes (playing cards auto-starts play)
  if (phase === 'stakes' && s.stake_offerer_idx !== myPlayerIdx) return true;
  if (phase === 'playing' && s.active_player_idx === myPlayerIdx) return true;
  if ((phase === 'cutting' || phase === 'forced_cut') && s.playing_player_idx !== myPlayerIdx) return true;
  if (passModeActive) return true;
  return false;
}

let prevHandKeys = ['', ''];
function renderHandCards(container, hand, canSelect, playerIdx, s) {
  // Only re-render if hand actually changed (prevents flicker/deselect on poll)
  const key = JSON.stringify(hand.map(c => c.id || c.hidden));
  if (key === prevHandKeys[playerIdx] && !debugMode) {
    // Still need to update selection highlights
    container.querySelectorAll('.card').forEach(el => {
      const cid = el.dataset.id;
      if (!cid) return;
      el.classList.toggle('selected', selectedCards.includes(cid));
    });
    return;
  }
  prevHandKeys[playerIdx] = key;

  const wasEmpty = container.children.length === 0;
  container.innerHTML = '';

  if (!hand || hand.length === 0) {
    container.innerHTML = `<span style="color:var(--text-dim);font-size:.8rem;font-style:italic;align-self:center;">No cards</span>`;
    return;
  }

  hand.forEach((card, i) => {
    const isSel = card.id && selectedCards.includes(card.id);
    const isTrump = s.trump_suit && card.suit === s.trump_suit;
    const html = buildCard(card, isSel, canSelect, false, isTrump);
    const wrapper = document.createElement('div');
    wrapper.innerHTML = html;
    const el = wrapper.firstElementChild;
    if (wasEmpty) {
      el.style.animationDelay = `${i * 0.07}s`;
      el.classList.add('deal-anim');
    }
    if (card.id && canSelect) {
      el.addEventListener('click', () => toggleCard(card.id));
    }
    container.appendChild(el);
  });
}

let prevPlayedKey = '';
function renderTable(s) {
  const row = document.getElementById('played-row');
  const label = document.getElementById('table-label');

  if (s.played_cards && s.played_cards.length > 0) {
    label.textContent = s.is_maliutka ? '⚡ MALIUTKA — opponent must cut!' : 'On the table';
    label.className = s.is_maliutka ? 'zone-label maliutka' : 'zone-label';

    const newKey = s.played_cards.map(c => c.id).join(',');
    if (newKey !== prevPlayedKey) {
      prevPlayedKey = newKey;
      row.innerHTML = '';
      s.played_cards.forEach((card, i) => {
        const wrapper = document.createElement('div');
        wrapper.innerHTML = buildCard(card, false, false, false, s.trump_suit && card.suit === s.trump_suit);
        const el = wrapper.firstElementChild;
        el.classList.add('no-hover', 'table-anim');
        el.style.animationDelay = `${i * 0.1}s`;
        row.appendChild(el);
      });
    }
  } else {
    prevPlayedKey = '';
    row.innerHTML = '';
    const phaseLabels = {
      waiting: 'Waiting…',
      stakes: 'Stake negotiation',
      playing: 'Select cards from your hand',
      cutting: 'Cut or pass?',
      forced_cut: '⚡ MALIUTKA — must cut!',
      calculating: 'Calculate?',
      round_over: 'Round over',
      game_over: 'Game over',
    };
    label.textContent = phaseLabels[s.phase] || '';
    label.className = s.phase === 'forced_cut' ? 'zone-label maliutka' : 'zone-label';
  }
}

// ─────────────────────────────────────────────
// CARD HTML BUILDER
// ─────────────────────────────────────────────
function buildCard(card, selected=false, selectable=true, mini=false, isTrump=false) {
  if (!card || card.hidden) {
    return `<div class="card face-down no-hover"></div>`;
  }
  const sym = suit_sym(card.suit);
  const cc = color_cls(card.suit);
  const selCls = selected ? 'selected' : '';
  const trumpCls = isTrump ? 'trump-glow' : '';
  const hoverCls = selectable ? '' : 'no-hover';
  const miniStyle = mini ? 'style="width:56px;height:78px;"' : '';

  return `<div class="card ${selCls} ${trumpCls} ${hoverCls}" data-id="${card.id}" ${miniStyle}>
    <div class="cc top"><span class="rank ${cc}">${card.rank}</span><span class="sym ${cc}">${sym}</span></div>
    <div class="card-mid ${cc}">${sym}</div>
    <div class="cc bot"><span class="rank ${cc}">${card.rank}</span><span class="sym ${cc}">${sym}</span></div>
  </div>`;
}

// ─────────────────────────────────────────────
// CARD SELECTION
// ─────────────────────────────────────────────
function toggleCard(cardId) {
  if (!canSelectCards(gameState)) return;
  const idx = selectedCards.indexOf(cardId);
  if (idx >= 0) {
    selectedCards.splice(idx, 1);
  } else {
    if (passModeActive && selectedCards.length >= passCount) {
      selectedCards.shift(); // rotate out oldest
    }
    selectedCards.push(cardId);
  }
  // Update just the selection state without full re-render
  document.querySelectorAll('.card[data-id]').forEach(el => {
    el.classList.toggle('selected', selectedCards.includes(el.dataset.id));
  });
  updateActionButtons();
}

function clearSel() {
  selectedCards = [];
  document.querySelectorAll('.card.selected').forEach(el => el.classList.remove('selected'));
  updateActionButtons();
}

function updateActionButtons() {
  const s = gameState;
  if (!s) return;
  const sel = selectedCards.length;

  const playBtn = document.getElementById('btn-play');
  if (playBtn) {
    playBtn.disabled = sel === 0;
    playBtn.textContent = sel > 0 ? `Play ${sel} card${sel>1?'s':''}` : 'Play cards…';
  }
  const cutBtn = document.getElementById('btn-cut');
  if (cutBtn) {
    const n = s.played_cards?.length || 0;
    cutBtn.disabled = sel !== n;
    cutBtn.textContent = sel > 0 ? `Cut with ${sel}` : 'Cut…';
  }
  const passConfBtn = document.getElementById('btn-pass-confirm');
  if (passConfBtn) {
    passConfBtn.disabled = sel !== passCount;
  }
}

// ─────────────────────────────────────────────
// ACTION PANEL
// ─────────────────────────────────────────────
function renderActions(s) {
  const msgEl = document.getElementById('action-msg');
  const btnsEl = document.getElementById('action-btns');
  msgEl.innerHTML = '';
  btnsEl.innerHTML = '';

  const me = s.players[myPlayerIdx];
  const them = s.players[1 - myPlayerIdx];
  const iAmActive = s.active_player_idx === myPlayerIdx;
  const iAmPlaying = s.playing_player_idx === myPlayerIdx;
  const iAmCalc = s.calculator_idx === myPlayerIdx;
  const canRaise = s.can_raise_stake?.[myPlayerIdx] ?? false;
  const pendingFromOpp = s.stake_offerer_idx !== null && s.stake_offerer_idx !== myPlayerIdx;
  const pendingFromMe = s.stake_offerer_idx === myPlayerIdx;

  // ── WAITING
  if (s.phase === 'waiting') {
    msgEl.textContent = 'Ready to start.';
    btnsEl.innerHTML = `<button class="btn btn-gold" onclick="doStartRound()">Deal Cards</button>`;
    return;
  }

  // ── GAME OVER
  if (s.phase === 'game_over') {
    const wIdx = s.round_winner_idx ?? (s.players[0].game_score >= s.target_score ? 0 : 1);
    const w = s.players[wIdx];
    msgEl.innerHTML = `<span class="hl">🏆 ${w.name} wins the game!</span>`;
    btnsEl.innerHTML = `<button class="btn btn-gold" onclick="showLobby()">Play Again</button>`;
    return;
  }

  // ── ROUND OVER
  if (s.phase === 'round_over') {
    msgEl.textContent = 'Round over.';
    btnsEl.innerHTML = `<button class="btn btn-gold" onclick="doStartRound()">Next Round →</button>`;
    return;
  }

  // ── STAKES
  if (s.phase === 'stakes') {
    if (pendingFromOpp) {
      // Opponent offered raise
      const newS = s.pending_stake;
      msgEl.innerHTML = `<span class="hl">${them.name}</span> raises stake to <span class="hl">${newS}</span> — Accept or Decline?`;
      btnsEl.innerHTML = `
        <button class="btn btn-green" onclick="doAcceptStake()">Accept (stake = ${newS})</button>
        <button class="btn btn-red" onclick="doDeclineStake()">Decline (give ${s.current_stake} pt)</button>
        ${canRaise ? `<button class="btn btn-ghost btn-sm" onclick="doRaiseStake()">Raise to ${newS+1}</button>` : ''}
      `;
    } else if (pendingFromMe) {
      // I raised, waiting for them
      msgEl.innerHTML = `You offered to raise to <span class="hl">${s.pending_stake}</span>. Waiting for ${them.name}…`;
    } else {
      // No pending offer — I can raise or just play
      const nextS = s.current_stake + 1;
      const stakeInfo = `<span class="stake-info">Stake <span class="sv">${s.current_stake}</span></span>`;
      msgEl.innerHTML = `${stakeInfo} Select cards to play, or raise the stake.`;
      if (canRaise && nextS <= 6) {
        btnsEl.innerHTML = `<button class="btn btn-ghost btn-sm" onclick="doRaiseStake()">⬆ Raise to ${nextS}</button>`;
      }
    }
    // Allow playing cards even in stakes — auto-accepts
    if (!pendingFromOpp && !pendingFromMe) {
      const playBtn = document.createElement('button');
      playBtn.className = 'btn btn-gold';
      playBtn.id = 'btn-play';
      playBtn.disabled = selectedCards.length === 0;
      playBtn.textContent = selectedCards.length > 0 ? `Play ${selectedCards.length} card${selectedCards.length>1?'s':''}` : 'Play cards…';
      playBtn.onclick = doPlayCards;
      btnsEl.appendChild(playBtn);
      if (selectedCards.length > 0) {
        const clearBtn = document.createElement('button');
        clearBtn.className = 'btn btn-ghost btn-sm';
        clearBtn.textContent = 'Clear';
        clearBtn.onclick = clearSel;
        btnsEl.appendChild(clearBtn);
      }
    }
    return;
  }

  // ── PLAYING — my turn
  if (s.phase === 'playing' && iAmActive) {
    msgEl.innerHTML = `Your turn — select <span class="hl">1–3 cards of the same suit</span>.`;
    const stakeInfo = `<span class="stake-info">Stake <span class="sv">${s.current_stake}</span></span>`;
    btnsEl.innerHTML = `
      <button class="btn btn-gold" id="btn-play" onclick="doPlayCards()" ${selectedCards.length===0?'disabled':''}>
        ${selectedCards.length>0 ? `Play ${selectedCards.length} card${selectedCards.length>1?'s':''}` : 'Play cards…'}
      </button>
      ${selectedCards.length>0 ? `<button class="btn btn-ghost btn-sm" onclick="clearSel()">Clear</button>` : ''}
    `;
    return;
  }

  // ── PLAYING — opponent's turn
  if (s.phase === 'playing' && !iAmActive) {
    msgEl.innerHTML = `<span class="hl">${them.name}</span> is playing…`;
    return;
  }

  // ── CUTTING — I must respond
  if ((s.phase === 'cutting' || s.phase === 'forced_cut') && !iAmPlaying) {
    const n = s.played_cards?.length || 0;
    const validCuts = s.valid_cuts || [];
    const isForced = s.phase === 'forced_cut';
    const sel = selectedCards.length;

    if (isForced) {
      msgEl.innerHTML = `<span class="warn">⚡ MALIUTKA!</span> You must try to cut ${n} card${n>1?'s':''}.`;
    } else {
      msgEl.innerHTML = `${them.name} played ${n} card${n>1?'s':''}. <span class="hl">Cut or pass?</span>`;
    }

    btnsEl.innerHTML = `
      <button class="btn btn-gold" id="btn-cut" onclick="doCutCards()" ${sel!==n?'disabled':''}>
        ${sel>0 ? `Cut with ${sel}` : 'Cut…'}
      </button>
      ${(!isForced || validCuts.length===0) ? `<button class="btn btn-ghost" onclick="showPassUI(${n})">Pass ${n}</button>` : ''}
      ${sel>0 ? `<button class="btn btn-ghost btn-sm" onclick="clearSel()">Clear</button>` : ''}
    `;

    if (validCuts.length > 0) {
      const hint = validCuts.slice(0,2).map(c => `[${c.join(' ')}]`).join('  ');
      btnsEl.insertAdjacentHTML('beforeend',
        `<div style="width:100%;font-size:.72rem;color:var(--text-dim);margin-top:4px;">
          Valid cuts: <span style="color:var(--gold)">${hint}</span>
        </div>`);
    }
    return;
  }

  // ── CUTTING — I played, waiting
  if ((s.phase === 'cutting' || s.phase === 'forced_cut') && iAmPlaying) {
    const label = s.phase === 'forced_cut' ? '⚡ Maliutka! ' : '';
    msgEl.innerHTML = `${label}Waiting for <span class="hl">${them.name}</span> to cut or pass…`;
    return;
  }

  // ── CALCULATING — my right
  if (s.phase === 'calculating' && iAmCalc) {
    const known = me.known_pile_points;
    const hc = me.hidden_card_count;
    const hmin = me.hidden_min_points;
    const hmax = me.hidden_max_points;
    msgEl.innerHTML = `You may calculate! Known: <span class="hl">${known}pts</span> + ${hc} hidden (${hmin}–${hmax}). <em style="color:var(--text-dim);font-size:.85em;">Tap 💡 to estimate.</em>`;
    btnsEl.innerHTML = `
      <button class="btn btn-gold" onclick="doCalculate()">Calculate (reveal pile)</button>
      <button class="btn btn-ghost" onclick="doSkipCalc()">Keep playing →</button>
    `;
    return;
  }

  // ── CALCULATING — opponent's right
  if (s.phase === 'calculating' && !iAmCalc) {
    msgEl.innerHTML = `<span class="hl">${them.name}</span> is deciding whether to calculate…`;
    return;
  }
}

// ─────────────────────────────────────────────
// PASS MODE
// ─────────────────────────────────────────────
function showPassUI(n) {
  passModeActive = true;
  passCount = n;
  clearSel();
  const msgEl = document.getElementById('action-msg');
  const btnsEl = document.getElementById('action-btns');
  msgEl.innerHTML = `Select <span class="hl">${n}</span> card${n>1?'s':''} to pass (opponent won't see which).`;
  btnsEl.innerHTML = `
    <button class="btn btn-red" id="btn-pass-confirm" onclick="doPassCards()" disabled>
      Pass ${n} card${n>1?'s':''}
    </button>
    <button class="btn btn-ghost btn-sm" onclick="cancelPass()">Cancel</button>
  `;
  prevHandKeys[myPlayerIdx] = ''; // force re-render so cards become clickable
  renderZone(myPlayerIdx, gameState);
}

function cancelPass() {
  passModeActive = false;
  clearSel();
  renderActions(gameState);
  prevHandKeys[myPlayerIdx] = '';
  renderZone(myPlayerIdx, gameState);
}

// ─────────────────────────────────────────────
// TIP — icon always in pile-info, popup in player zone
// ─────────────────────────────────────────────
function toggleTip(evt) {
  if (evt) evt.stopPropagation();
  showTip = !showTip;
  const iconBtn = document.getElementById('tip-icon-btn');
  const container = document.getElementById('tip-popup-container');

  if (showTip) {
    // Request tip from server (tip is computed on server, available in state during calculating)
    const tip = gameState?.tip;
    if (tip) {
      iconBtn?.classList.add('active');
      renderTip(tip, container);
    } else {
      // Compute client-side estimate from pile info
      const me = gameState?.players[myPlayerIdx];
      if (me) {
        const fakeTip = {
          known_points: me.known_pile_points,
          hidden_count: me.hidden_card_count,
          min_total: me.known_pile_points + me.hidden_card_count * 2,
          max_total: me.known_pile_points + me.hidden_card_count * 11,
          can_possibly_win: (me.known_pile_points + me.hidden_card_count * 11) >= 31,
          guaranteed_win: (me.known_pile_points + me.hidden_card_count * 2) >= 31,
        };
        iconBtn?.classList.add('active');
        renderTip(fakeTip, container);
      }
    }
  } else {
    iconBtn?.classList.remove('active');
    container.innerHTML = '';
  }

  // Close popup when clicking elsewhere
  if (showTip) {
    setTimeout(() => document.addEventListener('click', closeTipOnClickOutside, {once:true}), 50);
  }
}

function closeTipOnClickOutside() {
  showTip = false;
  document.getElementById('tip-icon-btn')?.classList.remove('active');
  const c = document.getElementById('tip-popup-container');
  if (c) c.innerHTML = '';
}

function renderTip(tip, container) {
  const sure = tip.guaranteed_win;
  const possible = tip.can_possibly_win;
  container.innerHTML = `
    <div class="tip-popup">
      <strong style="color:var(--gold);font-size:.85rem;">Score Estimate</strong><br>
      Known: <span class="tl">${tip.known_points} pts</span><br>
      Hidden: <span class="tl">${tip.hidden_count} cards</span>
        → range <span class="tl">${tip.min_total}–${tip.max_total}</span><br>
      ${sure
        ? `<span class="tw">✓ Definitely 31+ — safe to calculate!</span>`
        : possible
          ? `<span class="tl">⚠ Possible win if hidden cards are good.</span>`
          : `<span class="tx">✗ Can't reach 31 even in best case.</span>`}
    </div>`;
}

// ─────────────────────────────────────────────
// API ACTIONS
// ─────────────────────────────────────────────
async function doStartRound() {
  document.getElementById('round-modal').classList.remove('visible');
  modalShown = false;
  selectedCards = [];
  passModeActive = false;
  showTip = false;
  const c = document.getElementById('tip-popup-container');
  if (c) c.innerHTML = '';
  document.getElementById('tip-icon-btn')?.classList.remove('active');
  prevHandKeys = ['', ''];
  prevPlayedKey = '';
  const data = await api(ROOM('start_round'), {player_idx: myPlayerIdx});
  if (data?.state) { gameState = data.state; render(); }
}

async function doRaiseStake() {
  const data = await api(ROOM('offer_stake'), {player_idx: myPlayerIdx});
  if (data?.state) { gameState = data.state; render();
    logAction(`<span class="le-type">RAISE</span>${gameState.players[myPlayerIdx].name} raised stake to ${gameState.pending_stake}`);
  }
}

async function doAcceptStake() {
  const data = await api(ROOM('accept_stake'), {player_idx: myPlayerIdx});
  if (data?.state) { gameState = data.state; render();
    logAction(`<span class="le-type">ACCEPT</span>${gameState.players[myPlayerIdx].name} accepted stake ${gameState.current_stake}`);
  }
}

async function doDeclineStake() {
  const data = await api(ROOM('decline_stake'), {player_idx: myPlayerIdx});
  if (data?.state) { gameState = data.state; render(); }
}

async function doPlayCards() {
  if (selectedCards.length === 0) return;
  const cards = [...selectedCards];
  clearSel();
  passModeActive = false;
  prevPlayedKey = '';
  prevHandKeys[myPlayerIdx] = '';
  const data = await api(ROOM('play'), {player_idx: myPlayerIdx, cards});
  if (data?.state) {
    gameState = data.state;
    logAction(`<span class="le-type">PLAY</span>${gameState.players[myPlayerIdx].name} played ${cards.join(' ')}`);
    render();
  }
}

async function doCutCards() {
  if (selectedCards.length === 0) return;
  const cards = [...selectedCards];
  clearSel();
  passModeActive = false;
  prevHandKeys[myPlayerIdx] = '';
  const data = await api(ROOM('cut'), {player_idx: myPlayerIdx, cards});
  if (data?.state) {
    gameState = data.state;
    logAction(`<span class="le-type">CUT</span>${gameState.players[myPlayerIdx].name} cut with ${cards.join(' ')}`);
    render();
  }
}

async function doPassCards() {
  if (selectedCards.length !== passCount) return;
  const cards = [...selectedCards];
  clearSel();
  passModeActive = false;
  prevHandKeys[myPlayerIdx] = '';
  const data = await api(ROOM('pass'), {player_idx: myPlayerIdx, cards});
  if (data?.state) {
    gameState = data.state;
    logAction(`<span class="le-type">PASS</span>${gameState.players[myPlayerIdx].name} passed ${passCount} card${passCount>1?'s':''}`);
    render();
  }
}

async function doCalculate() {
  const data = await api(ROOM('calculate'), {player_idx: myPlayerIdx});
  if (data?.state) { gameState = data.state; showTip = false; render(); }
}

async function doSkipCalc() {
  clearSel();
  prevHandKeys = ['',''];
  prevPlayedKey = '';
  const data = await api(ROOM('skip_calculate'), {player_idx: myPlayerIdx});
  if (data?.state) { gameState = data.state; showTip = false; render(); }
}

// ─────────────────────────────────────────────
// ROUND MODAL
// ─────────────────────────────────────────────
function showRoundModal(s) {
  const isGameOver = s.phase === 'game_over';
  const wIdx = s.round_winner_idx ?? 0;
  const iWon = wIdx === myPlayerIdx;
  const winner = s.players[wIdx];

  const title = document.getElementById('modal-title');
  const sub = document.getElementById('modal-sub');
  const scores = document.getElementById('modal-scores');
  const btn = document.getElementById('modal-btn');

  if (isGameOver) {
    title.textContent = `🏆 ${winner.name} Wins!`;
    title.className = `modal-title ${iWon ? 'win' : 'lose'}`;
    sub.textContent = `${winner.name} reached ${s.target_score} points. Game over!`;
    btn.textContent = 'Play Again';
    btn.onclick = showLobby;
  } else {
    title.textContent = iWon ? '✓ You Win!' : `${winner.name} Wins`;
    title.className = `modal-title ${iWon ? 'win' : 'lose'}`;
    const reasons = {
      calculated_win: iWon ? 'You calculated 31+ and won!' : `${winner.name} calculated 31+.`,
      calculated_lose: iWon ? `${s.players[1-wIdx].name} counted but fell short.` : 'You counted but had less than 31.',
      three_trumps: iWon ? 'You played 3 trumps — instant win!' : `${winner.name} played 3 trumps!`,
      stake_declined: iWon ? `${s.players[1-wIdx].name} declined your raise.` : 'You declined the raise.',
      deck_exhausted: `Deck exhausted — ${winner.name} had more points.`,
    };
    sub.textContent = (reasons[s.round_end_reason] || s.round_end_reason) + `  (Stake: ${s.current_stake})`;
    btn.textContent = 'Next Round →';
    btn.onclick = doStartRound;
  }

  scores.innerHTML = s.players.map(p => `
    <div class="ms-entry">
      <div class="ms-name">${p.name}</div>
      <div class="ms-val">${p.game_score}</div>
    </div>`).join('<div style="display:flex;align-items:center;color:var(--text-dim)">vs</div>');

  document.getElementById('round-modal').classList.add('visible');
}

// ─────────────────────────────────────────────
// DEBUG
// ─────────────────────────────────────────────
function toggleDebug() {
  debugMode = !debugMode;
  document.getElementById('debug-panel').classList.toggle('visible', debugMode);
  document.getElementById('debug-btn').textContent = debugMode ? '⚙ Debug ON' : '⚙ Debug';
  // Force full re-render so hands show/hide correctly
  prevHandKeys = ['', ''];
  if (gameState) render();
  if (debugMode) refreshState(true);
}

function renderDebug(s) {
  document.getElementById('dbg-phase').textContent = s.phase;
  document.getElementById('dbg-stake').textContent = `${s.current_stake} → ${s.pending_stake}`;
  document.getElementById('dbg-active').textContent = s.active_player_id;
  document.getElementById('dbg-calc').textContent = s.calculator_id || '—';

  const fmt = (hand) => (hand||[]).map(c => {
    if (c.hidden) return `<span class="dcard">?</span>`;
    const t = s.trump_suit && c.suit === s.trump_suit ? 'trump' : '';
    return `<span class="dcard ${t}">${c.rank}${suit_sym(c.suit)}</span>`;
  }).join('');

  document.getElementById('dbg-p1h').innerHTML = fmt(s.players[0].hand);
  document.getElementById('dbg-p2h').innerHTML = fmt(s.players[1].hand);
  document.getElementById('dbg-p1p').textContent =
    `${s.players[0].pile_count} cards, true:${s.players[0].pile_points ?? '?'}pts`;
  document.getElementById('dbg-p2p').textContent =
    `${s.players[1].pile_count} cards, true:${s.players[1].pile_points ?? '?'}pts`;

  const top5 = (s.deck.cards||[]).slice(0,5).map(c =>
    `<span class="dcard ${c.suit===s.trump_suit?'trump':''}">${c.rank}${suit_sym(c.suit)}</span>`
  ).join('');
  document.getElementById('dbg-deck').innerHTML = top5;

  document.getElementById('dbg-log').textContent =
    (s.move_history||[]).slice(-6).reverse().map(m =>
      `[${m.type}] ${m.player}: ${JSON.stringify(m.data).slice(0,70)}`
    ).join('\n');
}

// ─────────────────────────────────────────────
// KEYBOARD
// ─────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (!gameState) return;
  if (e.key === 'Enter') {
    if (gameState.phase === 'playing' && gameState.active_player_idx === myPlayerIdx && selectedCards.length) doPlayCards();
    if ((gameState.phase === 'cutting' || gameState.phase === 'forced_cut') && selectedCards.length === (gameState.played_cards?.length||0)) doCutCards();
    if (passModeActive && selectedCards.length === passCount) doPassCards();
  }
  if (e.key === 'Escape') { clearSel(); if (passModeActive) cancelPass(); }
});

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
checkUrlJoin();
</script>
